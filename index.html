<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bixbee — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14171A;
    --hero-blue:#2F86C9;
    --wing-teal:#3C7C86;
    --gold:#F0A93B;
    --paper:#FFFFFF;
    --mist:#F4F6F7;
    --line:#E6E9EB;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
  }

  .stage{
    width:100%;
    max-width:640px;
    padding:56px 32px 48px;
    text-align:center;
    position:relative;
    z-index:2;
  }

  /* floating dot trail, echoes the logo's wing dots */
  .dots{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:1;
  }
  .dot{
    position:absolute;
    border-radius:50%;
    background:var(--wing-teal);
    opacity:.55;
    animation:drift 7s ease-in-out infinite;
  }
  .dot:nth-child(1){width:8px;height:8px; top:8%; left:12%; animation-delay:0s; background:var(--wing-teal);}
  .dot:nth-child(2){width:5px;height:5px; top:18%; left:82%; animation-delay:1.2s; background:var(--gold);}
  .dot:nth-child(3){width:6px;height:6px; top:70%; left:6%; animation-delay:2.1s; background:var(--hero-blue);}
  .dot:nth-child(4){width:4px;height:4px; top:85%; left:88%; animation-delay:.6s; background:var(--wing-teal);}
  .dot:nth-child(5){width:7px;height:7px; top:40%; left:92%; animation-delay:3s; background:var(--gold);}
  .dot:nth-child(6){width:5px;height:5px; top:60%; left:3%; animation-delay:1.8s; background:var(--hero-blue);}

  @keyframes drift{
    0%,100%{transform:translateY(0) translateX(0);}
    50%{transform:translateY(-14px) translateX(6px);}
  }

  .logo-wrap{
    margin-bottom:6px;
    opacity:0;
    animation:riseIn .7s ease forwards;
  }
  .logo-wrap img{
    width:190px;
    max-width:60%;
    height:auto;
    display:inline-block;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'Work Sans', sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--wing-teal);
    margin:20px 0 18px;
    opacity:0;
    animation:riseIn .7s ease forwards;
    animation-delay:.1s;
  }
  .eyebrow::before,.eyebrow::after{
    content:"";
    width:22px;
    height:1px;
    background:var(--line);
  }

  h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:clamp(30px, 6vw, 44px);
    line-height:1.15;
    margin:0 0 6px;
    color:var(--ink);
    opacity:0;
    animation:riseIn .7s ease forwards;
    animation-delay:.2s;
  }
  h1 span{color:var(--hero-blue);}

  .swoosh{
    display:block;
    margin:10px auto 22px;
    width:220px;
    height:26px;
    opacity:0;
    animation:riseIn .7s ease forwards;
    animation-delay:.3s;
  }

  .sub{
    font-size:16px;
    line-height:1.6;
    color:#565C60;
    max-width:420px;
    margin:0 auto 34px;
    opacity:0;
    animation:riseIn .7s ease forwards;
    animation-delay:.35s;
  }

  .cta{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:var(--ink);
    color:#fff;
    text-decoration:none;
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    font-size:15px;
    padding:14px 26px;
    border-radius:999px;
    transition:transform .18s ease, background .18s ease;
    opacity:0;
    animation:riseIn .7s ease forwards;
    animation-delay:.45s;
  }
  .cta:hover{ transform:translateY(-2px); background:#000; }
  .cta:focus-visible{ outline:3px solid var(--hero-blue); outline-offset:3px; }
  .cta svg{ width:18px; height:18px; flex-shrink:0; }

  .contact-line{
    margin-top:16px;
    font-size:13px;
    color:#8A9094;
    letter-spacing:.02em;
    opacity:0;
    animation:riseIn .7s ease forwards;
    animation-delay:.5s;
  }
  .contact-line strong{ color:var(--ink); font-weight:600; }

  .divider{
    width:100%;
    max-width:180px;
    height:1px;
    background:var(--line);
    margin:38px auto 22px;
    opacity:0;
    animation:riseIn .7s ease forwards;
    animation-delay:.55s;
  }

  .footer{
    font-size:12.5px;
    color:#A2A8AC;
    letter-spacing:.05em;
    opacity:0;
    animation:riseIn .7s ease forwards;
    animation-delay:.6s;
  }
  .footer a{ color:#8A9094; text-decoration:none; border-bottom:1px solid var(--line); }
  .footer a:hover{ color:var(--hero-blue); border-color:var(--hero-blue); }

  @keyframes riseIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    .dot{ animation:none; }
    .logo-wrap,.eyebrow,h1,.swoosh,.sub,.cta,.contact-line,.divider,.footer{
      animation:none !important; opacity:1 !important; transform:none !important;
    }
  }

  @media (max-width:480px){
    .stage{ padding:40px 20px 36px; }
  }
</style>
</head>
